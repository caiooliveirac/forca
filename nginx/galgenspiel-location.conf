# Galgenspiel - Jogo da Forca em Alemão
# Backend rodando em 127.0.0.1:3077 via Docker
#
# OPÇÃO A: Incluir este arquivo em /etc/nginx/conf.d/
#          se o nginx principal já inclui conf.d/*.conf
#          dentro de um server block existente.
#
# OPÇÃO B: Copiar os location blocks abaixo para dentro
#          do server block existente (sites-enabled/).
#
# Ajustar:
#   - Porta 3077 se BACKEND_PORT for diferente
#   - Path /var/www/galgenspiel se WEB_DIR for diferente
#   - Prefixo /forca/ se quiser outro caminho

# Arquivos estáticos do frontend
location /forca/ {
    alias /var/www/galgenspiel/;
    try_files $uri $uri/ /forca/index.html;

    # Cache de assets buildados (JS, CSS, imagens com hash)
    location ~* /forca/assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# Proxy para a API do backend
location /forca/api/ {
    proxy_pass http://127.0.0.1:3077/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeouts
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
}
