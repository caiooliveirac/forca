# Galgenspiel - Jogo da Forca em Alemão
# Usar esta config se o servidor usa subdomínio por app.
#
# 1. Copiar para /etc/nginx/sites-available/galgenspiel
# 2. Ativar: ln -s /etc/nginx/sites-available/galgenspiel /etc/nginx/sites-enabled/
# 3. Testar: nginx -t && nginx -s reload
# 4. Configurar DNS: forca.seudominio.com → IP do servidor
# 5. SSL: sudo certbot --nginx -d forca.seudominio.com
#
# Ajustar:
#   - server_name para o domínio real
#   - Porta 3077 se BACKEND_PORT for diferente

server {
    listen 80;
    server_name forca.seudominio.com;

    root /var/www/galgenspiel;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        location ~* /assets/ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3077/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}
